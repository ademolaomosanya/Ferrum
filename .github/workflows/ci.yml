name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - name: Render example page
        run: cargo run --quiet -- paint examples/hello.html examples/theme.css ferrum-ci.ppm
      - name: Verify rendered image
        run: test -s ferrum-ci.ppm
